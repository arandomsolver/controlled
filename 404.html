<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controlled | Access Denied</title>
    <meta name="description" content="Error 404: The requested file was not found in the mainframe.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&family=Outfit:wght@300;400;600;800&family=Share+Tech+Mono&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=1.2">
    <link rel="icon" type="image/png" href="assets-main/favicon-ctld.png">
    <style>
        .error-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 80vh;
            text-align: center;
        }

        .error-code {
            font-family: var(--font-mono);
            font-size: 5rem;
            color: var(--primary-color);
            margin-bottom: 0;
            text-shadow: 0 0 20px rgba(255, 62, 62, 0.5);
        }

        .error-message {
            font-size: 1.5rem;
            margin-bottom: 2rem;
            color: var(--text-dim);
            max-width: 500px;
        }
    </style>
</head>

<body>
    <div class="scanlines"></div>
    <div class="noise"></div>
    <div class="vignette"></div>
    <div class="fog-wrapper">
        <div class="fog-layer layer1"></div>
        <div class="fog-layer layer2"></div>
    </div>
    <div class="site-background"></div>
    <div class="bg-matrix"></div>
    <div class="bg-particles"></div>
    <div class="spotlight"></div>
    <div class="custom-cursor">
        <div class="cursor-dot"></div>
        <div class="cursor-ring"></div>
    </div>

    <header>
        <nav class="glass">
            <div class="logo glitch-hover">CONTROLLED</div>
            <ul>
                <li><a href="index.html?skipLoader=true">Home</a></li>
                <li><a href="index.html#about">About</a></li>
                <li><a href="updates.html">Updates</a></li>
                <li><a href="index.html#other-games">Other games</a></li>
            </ul>
        </nav>
    </header>

    <main class="sub-page">
        <div class="info-wrapper">
            <div class="error-container">
                <section class="info-card glass reveal active">
                    <h1 class="error-code glitch-hover">404</h1>
                    <h2 class="glitch-hover">ACCESS_DENIED</h2>
                    <p class="error-message">The requested data could not be retrieved from the mainframe. It
                        may have been deleted or never existed.</p>
                    <div class="return-container">
                        <a href="index.html?skipLoader=true" class="btn-primary">REBOOT TO ENTRANCE</a>
                    </div>
                </section>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>

</html>
